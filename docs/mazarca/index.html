<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="A Minecraft server that supports Eaglercraft 1.8 and 1.12">
    <link rel="icon" type="image/x-icon" href="source/icon.png" />
    <link rel="stylesheet" href="source/css/main.css" />
    <link rel="stylesheet" href="source/css/rainbow.css" />
    <style>
        code { font-size:1rem }
    </style>
    <title>Mazarca | Home</title>
</head>
<body>
    <noscript>
        <header>
            Website won't function properly without JavaScript enabled in your browser!
            <small class="font-regular"><a href="https://enable-javascript.com" target="_blank">How to enable JavaScript</a></small>
        </header>
    </noscript>
    <main class="wrapper">
        <h3>About</h3>
        <div class="indented">
            <p>Mazarca is a Minecraft server that supports Eaglercraft <a href="https://client.eaglercraft.dev/1.8/" target="_blank">1.8</a> and <a href="https://client.eaglercraft.dev/1.12/" target="_blank">1.12</a>.</p>
            <div style="display: flex; justify-content: center; gap: 20px; margin: 15px 0px;">
                <button class="secondary" style="width: calc((100% - 60px) / 4);" id="smp">
                    SMP
                    <popup-content for="smp">
                        <h2>SMP</h2>
                        <p>A semi-vanilla survival with land claims and cool new items using <a href="https://github.com/Slimefun/Slimefun4/wiki">Slimefun</a>!</p>
                        <p>Seedmap: <a href="https://www.chunkbase.com/apps/seed-map#seed=839629186379115867&platform=java_1_12&dimension=overworld" target="_blank">839629186379115867</a></p>
                    </popup-content>
                </button>
                <button class="secondary" style="width: calc((100% - 60px) / 4);" id="anarchy">
                    Anarchy
                    <popup-content for="anarchy">
                        <h2>Anarchy</h2>
                        <p>Complete chaos!!</p>
                        <p>Seriously, nothing more...</p>
                    </popup-content>
                </button>
                <button class="secondary" style="width: calc((100% - 60px) / 4);" id="randomdrops">
                    Random Drops
                    <popup-content for="randomdrops">
                        <h2>Random Drops</h2>
                        <p>Complete chaos but block drops are randomized!</p>
                    </popup-content>
                </button>
                <button class="secondary" style="width: calc((100% - 60px) / 4);" id="minigames">
                    Minigames
                    <popup-content for="minigames">
                        <h2>Minigames</h2>
                        <p>Minigames for fun!</p>
                        <p>We have:</p>
                        <ul>
                            <li>PvP</li>
                            <li>Mace PvP</li>
                            <li>Boat Racing</li>
                            <li>Rocket Spleef</li>
                        </ul>
                    </popup-content>
                </button>
            </div>
        </div>

        <h3 id="ip-heading">IP Address</h3>
        <!-- edit ips in source/data/ips.json -->
        <noscript>
            <p class="indented">
                IP list can't be displayed, because JavaScript is disabled in your browser!<br>
                <small class="font-regular"><a href="https://enable-javascript.com" target="_blank">How to enable JavaScript</a></small>
            </p>
        </noscript>

        <div style="display: flex; align-items: center; gap: 10px; margin: 10px 0px 5px;">
            <h3 style="margin: 0px;">Players online:</h3>
            <p id="player-count" style="font-size: 20px; margin: 0px;">-</p>
        </div>

        <div class="text-center" style="margin-top: 10px">
            <a href="https://maza64.xyz/bounce" style="margin: 0px 10px; font-size: 12px; text-decoration: underline">Bounce game</a>
            <a href="https://maza64.xyz/flappy" style="margin: 0px 10px; font-size: 12px; text-decoration: underline">Flappy game</a>
            <a href="https://maza64.xyz/ef" style="margin: 0px 10px; font-size: 12px; text-decoration: underline">Particle simulator</a>
        </div>
    </main>
    <script src="source/js/header.js"></script>
    <script src="source/js/navigation.js"></script>
    <script src="source/js/CustomPopup.js"></script>
    <script src="source/js/ips.js"></script>
    <script src="source/js/selection.js"></script>
    <script src="source/js/message.js"></script>
    <script src="source/js/snow.js"></script>
    <script src="source/js/latest.js"></script>
    <script>
        const playerCount = document.getElementById("player-count");
        const ws = new WebSocket("wss://eagler.maza64.xyz");
        ws.onopen = () => {
            console.log("Connected to the server");
            ws.send("Accept: MOTD");
        };
        ws.onmessage = (event) => {
            let data = JSON.parse(event.data);
            console.log("Received:", data);
            playerCount.innerText = data.data.online;
            ws.close();
        };
        ws.onerror = (error) => {
            console.error("WebSocket error:", error);
        };
        ws.onclose = () => {
            console.log("Connection closed");
        };
    </script>
</body>
</html>
